<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Пятнашки{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <a href="{{ url_for('index') }}" class="nav-logo">ПЯТНАШКИ</a>
    <div class="nav-links">
        <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Каталог</a>
        <a href="{{ url_for('leaderboard') }}" class="{% if request.endpoint == 'leaderboard' %}active{% endif %}">Лидеры</a>
        <a href="{{ url_for('history') }}" class="{% if request.endpoint == 'history' %}active{% endif %}">История</a>
        {% if active_game %}
        <a href="{{ url_for('game') }}" class="nav-game-btn">▶ Продолжить игру</a>
        {% endif %}
    </div>
    <div class="nav-user">
        <span>{{ username }}</span>
        <a href="{{ url_for('logout') }}">Выйти</a>
    </div>
</nav>

<main class="container">
    {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
